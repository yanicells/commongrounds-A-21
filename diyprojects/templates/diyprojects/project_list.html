{% extends 'base.html' %}
{% load static %}

{% block title %}DIY Projects{% endblock %}

{% block content %}
  <h1>DIY Projects</h1>
  <ul>
    {% for project in projects %}
      <li>
        <a href="{{ project.get_absolute_url }}">
            {{ project.title }}
        </a>
      </li>
    {% empty %}
      <li>No projects available</li>
    {% endfor %}
  </ul>
{% endblock %}
