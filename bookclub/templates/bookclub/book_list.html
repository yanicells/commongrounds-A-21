{% extends 'base.html' %}
{% load static %}

{% block title %}Book Club{% endblock %}

{% block content %}
  <h1>Book Club</h1>
  <ul>
    {% for book in books %}
      <li>
        <a href="{{ book.get_absolute_url }}">
            {{ book.title }}
        </a>
      </li>
    {% empty %}
      <li>No books available</li>
    {% endfor %}
  </ul>
{% endblock %}
