{% extends 'base.html' %}
{% load static %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
  <h2>Merch Item: {{ product.name }}</h2>
  <ul>
    <li><strong>Type:</strong> {{ product.product_type }}</li>
    <li><strong>Price:</strong> P{{ product.price }}</li>
  </ul>
  <p><strong>Description:</strong> {{ product.description }}</p>

  <a href="{% url 'merchstore:item-list' %}">Back to all items</a>
{% endblock %}
