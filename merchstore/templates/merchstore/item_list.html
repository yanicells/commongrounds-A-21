{% extends 'base.html' %}
{% load static %}

{% block title %}Merch Store{% endblock %}

{% block content %}
  <h2>Merch Store</h2>
  <ul>
    {% for product in products %}
      <li>
        <a href="{{ product.get_absolute_url }}">
          {{ product.name }} - P{{ product.price }}
        </a>
      </li>
    {% empty %}
      <li>No products available.</li>
    {% endfor %}
  </ul>
{% endblock %}
