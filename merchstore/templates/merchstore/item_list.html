{% extends 'base.html' %}
{% load static %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
  <h1>{{ product.name }}</h1>
  <p><strong>Type:</strong> {{ product.product_type }}</p>
  <p><strong>Price:</strong> P{{ product.price }}</p>
  <p>{{ product.description }}</p>
  <a href="{% url 'merchstore:item-list' %}">Back to all items</a>
{% endblock %}
