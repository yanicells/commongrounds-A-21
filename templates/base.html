{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Common Grounds{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
    {% block styles %}{% endblock %}
  </head>
  <body>
    <header class="navbar">
      <h1 class="navbar-brand">Common Grounds</h1>
      <nav>
        <ul class="navbar-links">
          <li><a href="/">Home</a></li>
          <li><a href="/merchstore/items">Merch</a></li>
          <li><a href="/bookclub/books">Books</a></li>
          <li><a href="/commissions/requests">Commissions</a></li>
          <li><a href="/diyprojects/projects">Projects</a></li>
          <li><a href="/localevents/events">Events</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="container">{% block content %}{% endblock %}</div>
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
